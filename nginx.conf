# ============================================================
# 内网穿透(https://bbb.com) -> nginx(容器80) -> 后端 192.168.68.229:8080
# nginx 夹在中间补 CORS 响应头 + 处理 OPTIONS 预检，解决跨域
# 注意：TLS 由内网穿透层终结，nginx 收到的是 HTTP，无需配置 SSL 证书
# ============================================================
server {
    listen 80;
    listen [::]:80;
    # 用 _ 兜底，匹配任意 Host（穿透域名/隧道内部 host 都能命中）
    server_name _;

    # 允许的前端来源（改成你实际的前端域名）
    set $cors_origin 'https://img.heiok.top';

    location / {
        # 转发到内网后端，完整保留原始路径
        # /foo/bar -> http://192.168.68.229:8080/foo/bar
        proxy_pass http://192.168.68.229:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 600s;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;

        # 先隐藏后端可能返回的 CORS 头，避免与下面重复添加导致浏览器报错
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        # 普通响应统一补齐 CORS 头（always 保证 4xx/5xx 也带）
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials 'true'       always;
        add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        # 允许任意请求头：反射预检里 Access-Control-Request-Headers 的值
        add_header Access-Control-Allow-Headers     $http_access_control_request_headers always;
        add_header Access-Control-Max-Age           86400 always;

        # 处理 OPTIONS 预检请求：直接返回 204，不转发给后端，并带上跨域头
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials 'true'       always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            # 允许任意请求头：反射预检里 Access-Control-Request-Headers 的值
            add_header Access-Control-Allow-Headers     $http_access_control_request_headers always;
            add_header Access-Control-Max-Age           86400 always;
            add_header Content-Length 0 always;
            return 204;
        }
    }
}
